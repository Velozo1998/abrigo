<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abrigos — Controle de Locações</title>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14; --surface: #0f1520; --surface2: #151d2e;
    --border: #1e2d45; --border2: #243552; --text: #cdd6f4; --muted: #6272a4;
    --green: #50fa7b; --green-bg: #0a2018; --green-border: #1a4a2e;
    --blue: #8be9fd; --blue-bg: #081828; --blue-border: #0e3050;
    --red: #ff5555; --red-bg: #280a0a; --red-border: #4a1010;
    --yellow: #f1fa8c; --yellow-bg: #1e1c08; --yellow-border: #3a3510;
    --purple: #bd93f9; --purple-bg: #1a0a28; --purple-border: #3a1a50; --manut: #9a6fd8; --manut-bg: #251040; --manut-border: #5a2a80;
    --font-mono: 'IBM Plex Mono', monospace; --font: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  #loginScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  #loadingScreen { display:none; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:16px; }
  #app { display:none; }
  .login-box { background:var(--surface); border:1px solid var(--border2); border-radius:16px; padding:40px 48px; text-align:center; max-width:380px; }
  .login-icon { font-size:40px; margin-bottom:16px; }
  .login-title { font-family:var(--font-mono); font-size:18px; font-weight:700; color:#f8f8f2; margin-bottom:8px; }
  .login-sub { font-size:13px; color:var(--muted); margin-bottom:28px; line-height:1.6; }
  .spinner { width:36px; height:36px; border:3px solid var(--border2); border-top-color:var(--green); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { font-family:var(--font-mono); font-size:13px; color:var(--muted); }

  header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 28px; height:54px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-icon { width:30px; height:30px; background:linear-gradient(135deg,#1a4a2e,#50fa7b22); border:1px solid var(--green-border); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:15px; }
  .logo-title { font-family:var(--font-mono); font-weight:700; font-size:14px; letter-spacing:.08em; color:#f8f8f2; }
  .logo-sub { font-family:var(--font-mono); font-size:11px; color:var(--muted); }
  .header-right { display:flex; align-items:center; gap:10px; }
  .user-badge { font-family:var(--font-mono); font-size:11px; color:var(--muted); background:var(--surface2); border:1px solid var(--border); padding:4px 10px; border-radius:6px; }
  .save-status { font-family:var(--font-mono); font-size:11px; color:var(--green); opacity:0; transition:opacity .4s; }
  .save-status.show { opacity:1; }
  .btn-export { background:var(--surface2); border:1px solid var(--border2); color:var(--muted); padding:6px 14px; border-radius:7px; cursor:pointer; font-size:12px; font-family:var(--font-mono); transition:color .2s,border-color .2s; }
  .btn-export:hover { color:var(--text); border-color:var(--blue-border); }

  main { max-width:1200px; margin:0 auto; padding:28px 24px; }

  .stats { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:24px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; cursor:pointer; transition:border-color .2s,transform .15s; }
  .stat-card:hover { transform:translateY(-1px); }
  .stat-num { font-family:var(--font-mono); font-size:28px; font-weight:700; line-height:1; }
  .stat-label { font-size:10px; color:var(--muted); margin-top:5px; letter-spacing:.1em; text-transform:uppercase; font-family:var(--font-mono); }

  .filters { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; align-items:center; }
  .search-input { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:8px; font-size:13px; flex:1; min-width:220px; outline:none; transition:border-color .2s; }
  .search-input:focus { border-color:var(--blue-border); }
  .filter-btn { background:transparent; border:1px solid var(--border); color:var(--muted); padding:7px 14px; border-radius:8px; cursor:pointer; font-size:12px; font-family:var(--font-mono); transition:all .2s; white-space:nowrap; }
  .filter-btn.active { background:var(--surface2); border-color:var(--blue); color:var(--blue); }
  .filter-btn:hover:not(.active) { color:var(--text); border-color:var(--border2); }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:9px; }
  .abrigo-card { border-radius:10px; padding:14px 15px; cursor:pointer; transition:transform .15s,box-shadow .15s; border:1px solid; }
  .abrigo-card:hover { transform:translateY(-2px); }
  .abrigo-card.disponivel { background:var(--green-bg); border-color:var(--green-border); }
  .abrigo-card.alugado { background:var(--blue-bg); border-color:var(--blue-border); }
  .abrigo-card.atraso { background:var(--red-bg); border-color:var(--red-border); }
  .abrigo-card.retirada { background:var(--yellow-bg); border-color:var(--yellow-border); }
  .abrigo-card.aguardando { background:var(--purple-bg); border-color:var(--purple-border); }
  .abrigo-card.manutencao { background:var(--manut-bg); border-color:var(--manut-border); }
  .abrigo-card:hover.disponivel { box-shadow:0 4px 20px #50fa7b18; }
  .abrigo-card:hover.alugado { box-shadow:0 4px 20px #8be9fd18; }
  .abrigo-card:hover.atraso { box-shadow:0 4px 20px #ff555528; }
  .abrigo-card:hover.retirada { box-shadow:0 4px 20px #f1fa8c18; }
  .abrigo-card:hover.aguardando { box-shadow:0 4px 20px #bd93f928; }
  .abrigo-card:hover.manutencao { box-shadow:0 4px 20px #9a6fd828; }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:7px; }
  .card-num { font-family:var(--font-mono); font-size:21px; font-weight:700; color:#f8f8f2; }
  .card-dot { width:8px; height:8px; border-radius:50%; margin-top:5px; }
  .disponivel .card-dot { background:var(--green); box-shadow:0 0 6px var(--green); }
  .alugado .card-dot { background:var(--blue); box-shadow:0 0 6px var(--blue); }
  .atraso .card-dot { background:var(--red); box-shadow:0 0 6px var(--red); animation:pulse 1.5s infinite; }
  .retirada .card-dot { background:var(--yellow); box-shadow:0 0 6px var(--yellow); }
  .aguardando .card-dot { background:var(--purple); box-shadow:0 0 6px var(--purple); animation:pulse 1.5s infinite; }
  .manutencao .card-dot { background:var(--manut); box-shadow:0 0 6px var(--manut); animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .card-status { font-family:var(--font-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; font-weight:600; margin-bottom:5px; }
  .disponivel .card-status { color:var(--green); }
  .alugado .card-status { color:var(--blue); }
  .atraso .card-status { color:var(--red); }
  .retirada .card-status { color:var(--yellow); }
  .aguardando .card-status { color:var(--purple); }
  .manutencao .card-status { color:var(--manut); }
  .card-name { font-size:12px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .card-parcelas { font-size:11px; margin-top:4px; font-family:var(--font-mono); }
  .empty-msg { text-align:center; color:var(--muted); padding:60px 0; font-size:14px; }

  /* OVERLAY */
  .overlay { position:fixed; inset:0; background:#000000cc; display:flex; align-items:center; justify-content:center; z-index:100; padding:16px; opacity:0; transition:opacity .2s; pointer-events:none; }
  .overlay.open { opacity:1; pointer-events:all; }
  .panel { background:var(--surface); border:1px solid var(--border2); border-radius:14px; width:100%; max-width:600px; max-height:95vh; overflow-y:auto; scroll-behavior:smooth; transform:translateY(12px); transition:transform .2s; }
  .overlay.open .panel { transform:translateY(0); }
  .panel-header { padding:18px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:var(--surface); z-index:1; }
  .panel-title { font-family:var(--font-mono); font-weight:700; font-size:14px; color:#f8f8f2; }
  .panel-sub { font-family:var(--font-mono); font-size:11px; color:var(--muted); margin-top:2px; }
  .close-btn { background:none; border:none; color:var(--muted); font-size:22px; cursor:pointer; line-height:1; padding:2px 6px; }
  .close-btn:hover { color:var(--text); }
  .panel-body { padding:20px 24px 32px; }

  .info-block { background:var(--bg); border-radius:10px; padding:16px; margin-bottom:14px; border:1px solid var(--border); }
  .info-block-title { font-family:var(--font-mono); font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-bottom:10px; }
  .info-row { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid var(--border); }
  .info-row:last-child { border-bottom:none; }
  .info-key { font-size:12px; color:var(--muted); }
  .info-val { font-size:12px; color:var(--text); text-align:right; max-width:65%; }
  .action-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }

  /* PARCELAS */
  .parcela-item { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:8px; }
  .parcela-item.pago { border-color:var(--green-border); background:var(--green-bg); }
  .parcela-item.atrasado { border-color:var(--red-border); background:var(--red-bg); }
  .parcela-item.pendente { border-color:var(--border2); }
  .parcela-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .parcela-num { font-family:var(--font-mono); font-size:12px; font-weight:700; color:#f8f8f2; }
  .parcela-badge { font-family:var(--font-mono); font-size:9px; padding:2px 7px; border-radius:4px; text-transform:uppercase; letter-spacing:.06em; }
  .parcela-badge.pago { background:var(--green-bg); color:var(--green); border:1px solid var(--green-border); }
  .parcela-badge.atrasado { background:var(--red-bg); color:var(--red); border:1px solid var(--red-border); animation:pulse 1.5s infinite; }
  .parcela-badge.pendente { background:var(--surface2); color:var(--muted); border:1px solid var(--border2); }
  .parcela-info { display:flex; gap:16px; font-size:11px; color:var(--muted); margin-bottom:6px; }
  .parcela-pgto { font-size:11px; color:var(--green); margin-top:4px; }
  .parcela-multa { font-size:11px; color:var(--red); margin-top:2px; }
  .btn-pagar { background:var(--green-bg); border:1px solid var(--green-border); color:var(--green); padding:5px 12px; border-radius:6px; cursor:pointer; font-size:11px; font-family:var(--font-mono); margin-top:6px; }
  .btn-pagar:hover { opacity:.8; }

  /* HISTÓRICO */
  .hist-item { border-left:2px solid var(--border2); padding-left:12px; margin-bottom:10px; }
  .hist-date { font-family:var(--font-mono); font-size:10px; color:var(--muted); }
  .hist-desc { font-size:13px; color:var(--text); margin-top:2px; }
  .hist-obs { font-size:11px; color:var(--muted); margin-top:2px; }
  .hist-tipo { display:inline-block; font-family:var(--font-mono); font-size:9px; letter-spacing:.06em; padding:2px 6px; border-radius:4px; margin-bottom:3px; text-transform:uppercase; }
  .hist-tipo.locacao { background:var(--green-bg); color:var(--green); border:1px solid var(--green-border); }
  .hist-tipo.pagamento { background:var(--purple-bg); color:var(--purple); border:1px solid var(--purple-border); }
  .hist-tipo.devolucao { background:var(--red-bg); color:var(--red); border:1px solid var(--red-border); }
  .hist-tipo.renovacao { background:var(--blue-bg); color:var(--blue); border:1px solid var(--blue-border); }
  .hist-tipo.retirada { background:var(--yellow-bg); color:var(--yellow); border:1px solid var(--yellow-border); }

  /* FORM */
  .form-group { margin-bottom:13px; }
  .form-label { font-family:var(--font-mono); font-size:10px; color:var(--muted); display:block; margin-bottom:5px; text-transform:uppercase; letter-spacing:.08em; }
  .form-input, .form-textarea, .form-select { width:100%; background:var(--bg); border:1px solid var(--border2); color:var(--text); padding:8px 11px; border-radius:7px; font-size:13px; font-family:var(--font); outline:none; transition:border-color .2s; }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color:var(--blue-border); }
  .form-textarea { resize:none; }
  .form-select option { background:var(--surface); }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .form-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:18px; }
  .form-section { font-family:var(--font-mono); font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin:18px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border); }

  .btn { padding:8px 17px; border-radius:8px; cursor:pointer; font-size:13px; font-family:var(--font); font-weight:500; border:none; transition:opacity .15s; }
  .btn:hover { opacity:.85; }
  .btn-login { background:var(--green-bg); border:1px solid var(--green-border); color:var(--green); padding:12px 28px; border-radius:10px; cursor:pointer; font-size:14px; font-weight:600; width:100%; }
  .btn-cancel { background:none; border:1px solid var(--border2); color:var(--muted); }
  .btn-green { background:var(--green-bg); border:1px solid var(--green-border); color:var(--green); font-weight:600; }
  .btn-blue { background:var(--blue-bg); border:1px solid var(--blue-border); color:var(--blue); }
  .btn-red { background:var(--red-bg); border:1px solid var(--red-border); color:var(--red); font-weight:600; }
  .btn-yellow { background:var(--yellow-bg); border:1px solid var(--yellow-border); color:var(--yellow); }
  .btn-purple { background:var(--purple-bg); border:1px solid var(--purple-border); color:var(--purple); }
  .btn-sm { padding:7px 14px; font-size:12px; }
  .confirm-text { font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:14px; }
  .badge { display:inline-block; font-family:var(--font-mono); font-size:11px; padding:2px 8px; border-radius:5px; font-weight:600; }
  .badge-yellow { background:var(--yellow-bg); color:var(--yellow); border:1px solid var(--yellow-border); }
  .badge-red { background:var(--red-bg); color:var(--red); border:1px solid var(--red-border); }

  .tabs { display:flex; gap:4px; margin-bottom:16px; border-bottom:1px solid var(--border); }
  .tab { background:none; border:none; color:var(--muted); padding:8px 16px; cursor:pointer; font-size:13px; font-family:var(--font); border-bottom:2px solid transparent; margin-bottom:-1px; transition:color .2s; }
  .tab.active { color:var(--blue); border-bottom-color:var(--blue); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }


  /* DASHBOARD / FINANCEIRO */
  .dash-btn { background:var(--surface2); border:1px solid var(--border2); color:var(--muted); padding:6px 14px; border-radius:7px; cursor:pointer; font-size:12px; font-family:var(--font-mono); transition:color .2s,border-color .2s; }
  .dash-btn:hover { color:var(--text); border-color:var(--blue-border); }
  .fin-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
  .fin-card { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:16px; }
  .fin-num { font-family:var(--font-mono); font-size:22px; font-weight:700; margin-bottom:4px; }
  .fin-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
  .ocup-bar-wrap { background:var(--border); border-radius:4px; height:8px; margin-top:6px; }
  .ocup-bar { background:var(--green); height:8px; border-radius:4px; transition:width .4s; }

  /* VENCIMENTOS ALERTA */
  .alert-venc { background:var(--yellow-bg); border:1px solid var(--yellow-border); border-radius:8px; padding:10px 14px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
  .alert-venc-info { font-size:12px; color:var(--text); }
  .alert-venc-dias { font-family:var(--font-mono); font-size:11px; color:var(--yellow); }

  /* ANEXOS */
  .anexo-drop { border:2px dashed var(--border2); border-radius:10px; padding:24px; text-align:center; cursor:pointer; transition:border-color .2s; margin-bottom:12px; }
  .anexo-drop:hover,.anexo-drop.drag { border-color:var(--blue); }
  .anexo-drop-text { font-size:13px; color:var(--muted); }
  .anexo-item { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 14px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
  .anexo-nome { font-size:13px; color:var(--blue); cursor:pointer; text-decoration:none; }
  .anexo-nome:hover { text-decoration:underline; }
  .anexo-meta { font-size:11px; color:var(--muted); margin-top:2px; }
  .anexo-del { background:none; border:none; color:var(--red); cursor:pointer; font-size:16px; padding:0 4px; }

  /* MANUTENÇÃO */
  .manut-badge { display:inline-block; font-family:var(--font-mono); font-size:9px; padding:2px 7px; border-radius:4px; text-transform:uppercase; background:#1a1228; color:#bd93f9; border:1px solid #3a1a50; }

  /* RECIBO */
  .recibo-wrap { background:#fff; color:#111; padding:32px; border-radius:8px; font-family:'IBM Plex Sans',sans-serif; font-size:13px; line-height:1.6; }
  .recibo-titulo { font-size:18px; font-weight:700; text-align:center; margin-bottom:4px; }
  .recibo-sub { font-size:12px; color:#666; text-align:center; margin-bottom:20px; }
  .recibo-row { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #eee; }
  .recibo-footer { margin-top:24px; text-align:center; font-size:11px; color:#999; }
  @media (max-width:600px) {
    .stats { grid-template-columns:repeat(3,1fr); }
    .form-row,.form-row-3 { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-icon">🏗</div>
    <div class="login-title">CONTROLE DE ABRIGOS</div>
    <div class="login-sub">Faça login com sua conta Microsoft para acessar e sincronizar os dados com o SharePoint.</div>
    <button class="btn-login" onclick="fazerLogin()">Entrar com conta Microsoft</button>
  </div>
</div>

<div id="loadingScreen">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Carregando...</div>
</div>

<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">🏗</div>
      <div><div class="logo-title">ABRIGOS</div><div class="logo-sub">controle de locações</div></div>
    </div>
    <div class="header-right">
      <span class="user-badge" id="userBadge"></span>
      <span class="save-status" id="saveStatus">Salvo ✓</span>
      <button class="dash-btn" onclick="abrirDashboard()">📊 Financeiro</button>
      <button class="dash-btn" onclick="abrirVencimentos()">🔔 Vencimentos</button>
      <button class="dash-btn" onclick="abrirMenuFichas()">📄 Fichas</button>
      <button class="dash-btn" onclick="abrirLogGlobal()">📋 Histórico Geral</button>
      <button class="btn-export" onclick="exportarCSV()">↓ Exportar CSV</button>
    </div>
  </header>

  <main>
    <div class="stats">
      <div class="stat-card" onclick="setFiltro('todos')"><div class="stat-num" id="sn-total" style="color:#8be9fd">33</div><div class="stat-label">Total</div></div>
      <div class="stat-card" onclick="setFiltro('disponivel')"><div class="stat-num" id="sn-disponivel" style="color:#50fa7b">—</div><div class="stat-label">Disponíveis</div></div>
      <div class="stat-card" onclick="setFiltro('alugado')"><div class="stat-num" id="sn-alugado" style="color:#8be9fd">—</div><div class="stat-label">Alugados</div></div>
      <div class="stat-card" onclick="setFiltro('atraso')"><div class="stat-num" id="sn-atraso" style="color:#ff5555">—</div><div class="stat-label">Em Atraso</div></div>
      <div class="stat-card" onclick="setFiltro('retirada')"><div class="stat-num" id="sn-retirada" style="color:#f1fa8c">—</div><div class="stat-label">Retirada</div></div>
      <div class="stat-card" onclick="setFiltro('aguardando')"><div class="stat-num" id="sn-aguardando" style="color:#bd93f9">—</div><div class="stat-label">Ag. Entrega</div></div>
    </div>
    <div class="filters">
      <input class="search-input" id="searchInput" placeholder="Buscar nº, locatário, funcionário, endereço..." oninput="renderGrid()">
      <button class="filter-btn active" id="fb-todos" onclick="setFiltro('todos')">Todos</button>
      <button class="filter-btn" id="fb-disponivel" onclick="setFiltro('disponivel')">Disponível</button>
      <button class="filter-btn" id="fb-alugado" onclick="setFiltro('alugado')">Alugado</button>
      <button class="filter-btn" id="fb-atraso" onclick="setFiltro('atraso')">Em Atraso</button>
      <button class="filter-btn" id="fb-retirada" onclick="setFiltro('retirada')">Retirada</button>
      <button class="filter-btn" id="fb-aguardando" onclick="setFiltro('aguardando')" style="color:var(--purple)">Ag. Entrega</button>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty-msg" id="emptyMsg" style="display:none">Nenhum abrigo encontrado.</div>

</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────
const CLIENT_ID = 'a0ab05de-6867-47bf-9ed3-deef0af4e348';
const TENANT_ID = '54a9fe16-e777-4a62-9f76-8de94f2be11a';
const FILE_NAME = 'Dados do abrigo/abrigos-dados.json';
const DRIVE_ID = 'b!rKLFTB5n70mXnbL_HyTzD49kJGDjsyVPlVgVNAax3797bAbf1jW3SaFFpFQ7k8C9';
const SITE_ID = 'grupovagula2026.sharepoint.com,4cc5a2ac-671e-49ef-979d-b2ff1f24f30f,6024648f-b3e3-4f25-9558-153406b1dfbf';
const TOTAL = 33;
const SCOPES = ['Files.ReadWrite', 'Sites.ReadWrite.All', 'User.Read'];
const STATUS_LABEL = { disponivel:'Disponível', alugado:'Alugado', atraso:'Em Atraso', retirada:'Retirada Solicitada', aguardando:'Aguard. Entrega', manutencao:'Em Manutenção' };
const FORMAS_PGTO = ['PIX', 'Boleto', 'Dinheiro', 'Cartão'];

let msalInstance = null;
let accessToken = null;
let abrigos = [];
let filtroAtivo = 'todos';
let logGlobal = [];

// ─── AUTH ─────────────────────────────────────────────────
async function init() {
  msalInstance = new msal.PublicClientApplication({
    auth: { clientId: CLIENT_ID, authority: `https://login.microsoftonline.com/${TENANT_ID}`, redirectUri: 'https://velozo1998.github.io/abrigo/' },
    cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: true }
  });
  await msalInstance.initialize();
  const resp = await msalInstance.handleRedirectPromise();
  if (resp) { accessToken = resp.accessToken; await iniciarApp(resp.account); return; }
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    try {
      const s = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
      accessToken = s.accessToken; await iniciarApp(accounts[0]);
    } catch { mostrar('loginScreen'); }
  } else { mostrar('loginScreen'); }
}

async function fazerLogin() {
  if (!msalInstance) { alert('Aguarde...'); return; }
  await msalInstance.loginRedirect({ scopes: SCOPES });
}

async function iniciarApp(account) {
  mostrar('loadingScreen');
  document.getElementById('loadingText').textContent = 'Carregando dados do SharePoint...';
  document.getElementById('userBadge').textContent = account.username || account.name;
  abrigos = await carregar();
  mostrar('app');
  renderGrid();
  // Alert badge for vencimentos
  setTimeout(() => {
    const hoje2 = new Date(); hoje2.setHours(0,0,0,0);
    let count = 0;
    abrigos.forEach(a => (a.parcelas||[]).forEach(p => {
      if (p.status === 'pago') return;
      const diff = Math.ceil((new Date(p.vencimento+'T00:00:00') - hoje2) / 86400000);
      if (diff <= 7) count++;
    }));
    if (count > 0) {
      document.querySelector('[onclick="abrirVencimentos()"]').textContent = '🔔 Vencimentos (' + count + ')';
      document.querySelector('[onclick="abrirVencimentos()"]').style.color = 'var(--yellow)';
      document.querySelector('[onclick="abrirVencimentos()"]').style.borderColor = 'var(--yellow-border)';
    }
  }, 100);
}

// ─── SHAREPOINT ───────────────────────────────────────────
async function gFetch(url, opts = {}) {
  const res = await fetch('https://graph.microsoft.com/v1.0' + url, {
    ...opts, headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json', ...(opts.headers || {}) }
  });
  if (!res.ok && res.status !== 404) throw new Error(await res.text());
  return res;
}

let ultimoETag = null;

async function carregar() {
  try {
    const res = await gFetch(`/drives/${DRIVE_ID}/root:/${FILE_NAME}:/content`);
    if (res.status === 404) return dadosIniciais();
    // Store eTag to detect conflicts
    const metaRes = await gFetch(`/drives/${DRIVE_ID}/root:/${FILE_NAME}`);
    if (metaRes.ok) {
      const meta = await metaRes.json();
      ultimoETag = meta.eTag || meta.cTag || null;
    }
    const data = await res.json();
    return Array.isArray(data) ? data : dadosIniciais();
  } catch { return dadosIniciais(); }
}

async function salvar() {
  // Check for conflicts — verify eTag hasn't changed
  try {
    const metaRes = await gFetch(`/drives/${DRIVE_ID}/root:/${FILE_NAME}`);
    if (metaRes.ok) {
      const meta = await metaRes.json();
      const eTagAtual = meta.eTag || meta.cTag || null;
      if (ultimoETag && eTagAtual && ultimoETag !== eTagAtual) {
        // Conflict detected!
        const continuar = confirm(
          '⚠️ ATENÇÃO: Os dados foram alterados por outra pessoa desde que você abriu o sistema!\n\n' +
          'Se salvar agora, as alterações dela serão PERDIDAS.\n\n' +
          'Clique OK para salvar mesmo assim, ou Cancelar para recarregar os dados mais recentes.'
        );
        if (!continuar) {
          abrigos = await carregar();
          renderGrid();
          alert('Dados recarregados com as informações mais recentes. Refaça suas alterações.');
          return;
        }
      }
    }
  } catch(e) {}

  const blob = new Blob([JSON.stringify(abrigos, null, 2)], { type: 'application/json' });
  await gFetch(`/drives/${DRIVE_ID}/root:/${FILE_NAME}:/content`, {
    method: 'PUT', headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' }, body: blob
  });

  // Update eTag after saving
  try {
    const metaRes = await gFetch(`/drives/${DRIVE_ID}/root:/${FILE_NAME}`);
    if (metaRes.ok) {
      const meta = await metaRes.json();
      ultimoETag = meta.eTag || meta.cTag || null;
    }
  } catch(e) {}

  const el = document.getElementById('saveStatus');
  el.textContent = 'Salvo no SharePoint ✓';
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}


// ─── LOG GLOBAL ───────────────────────────────────────────
function addLog(tipo, desc, abrigoNum) {
  logGlobal.unshift({ ts: new Date().toISOString(), tipo, desc, abrigoNum, usuario: document.getElementById('userBadge').textContent });
  if (logGlobal.length > 500) logGlobal.length = 500; // keep last 500
}

// ─── DADOS INICIAIS ───────────────────────────────────────
function dadosIniciais() {
  return Array.from({ length: TOTAL }, (_, i) => ({
    id: i + 1, num: String(i + 1).padStart(2, '0'),
    status: 'disponivel',
    locatario: '', doc: '', tel: '', endereco: '',
    funcEntregou: '', funcRecolheu: '',
    dataLocacao: '', valorMensal: '',
    dataDevolucaoPrevista: '', multaAtraso: '',
    obs: '', historico: [], parcelas: [], anexos: [], emManutencao: false, dividas: [], transferencias: [], formaPagamento: ''
  }));
}

// ─── PARCELAS ─────────────────────────────────────────────
function gerarParcelas(dataLocacao, meses = 12) {
  const parcelas = [];
  const base = new Date(dataLocacao + 'T00:00:00');
  for (let i = 1; i <= meses; i++) {
    const d = new Date(base);
    d.setMonth(d.getMonth() + i);
    parcelas.push({
      id: i,
      vencimento: d.toISOString().split('T')[0],
      status: 'pendente', // pendente | pago | atrasado
      dataPagamento: '', formaPagamento: '', valorPago: '', obs: ''
    });
  }
  return parcelas;
}

function atualizarStatusParcelas(a) {
  if (!a.parcelas) return;
  const hoje = new Date(); hoje.setHours(0, 0, 0, 0);
  a.parcelas.forEach(p => {
    if (p.status === 'pago') return;
    const v = new Date(p.vencimento + 'T00:00:00');
    p.status = v < hoje ? 'atrasado' : 'pendente';
  });
}

// ─── STATUS GERAL ─────────────────────────────────────────
function calcStatus(a) {
  if (a.status === 'disponivel' || a.status === 'retirada' || a.status === 'aguardando') return a.status;
  atualizarStatusParcelas(a);
  const temAtraso = (a.parcelas || []).some(p => p.status === 'atrasado');
  return temAtraso ? 'atraso' : 'alugado';
}

// ─── RENDER GRID ──────────────────────────────────────────
function renderGrid() {
  const busca = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyMsg');
  const filtrados = abrigos.filter(a => {
    const st = calcStatus(a);
    const mF = filtroAtivo === 'todos' || st === filtroAtivo;
    const mB = !busca || a.num.includes(busca) || a.locatario.toLowerCase().includes(busca) || a.endereco.toLowerCase().includes(busca) || a.funcEntregou.toLowerCase().includes(busca);
    return mF && mB;
  });

  const counts = { total: TOTAL, disponivel: 0, alugado: 0, atraso: 0, retirada: 0 };
  abrigos.forEach(a => counts[calcStatus(a)]++);
  document.getElementById('sn-total').textContent = counts.total;
  document.getElementById('sn-disponivel').textContent = counts.disponivel;
  document.getElementById('sn-alugado').textContent = counts.alugado;
  document.getElementById('sn-atraso').textContent = counts.atraso;
  document.getElementById('sn-retirada').textContent = counts.retirada || 0;
  document.getElementById('sn-aguardando').textContent = counts.aguardando || 0;

  if (!filtrados.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  grid.innerHTML = filtrados.map(a => {
    const st = calcStatus(a);
    const pagas = (a.parcelas || []).filter(p => p.status === 'pago').length;
    const atrasadas = (a.parcelas || []).filter(p => p.status === 'atrasado').length;
    const total = (a.parcelas || []).length;
    let parcelasHtml = '';
    if (st !== 'disponivel') {
      const cor = atrasadas > 0 ? 'var(--red)' : 'var(--muted)';
      parcelasHtml = '<div class="card-parcelas" style="color:'+cor+'">'+(pagas)+'/'+total+' pagas'+(atrasadas>0?' · '+atrasadas+' atrasada'+(atrasadas>1?'s':''):'')+'</div>';
    }
    return '<div class="abrigo-card '+st+'" onclick="abrirDetalhe('+a.id+')">'
      + '<div class="card-top"><div class="card-num">#'+a.num+'</div><div class="card-dot"></div></div>'
      + '<div class="card-status">'+STATUS_LABEL[st]+'</div>'
      + (a.locatario ? '<div class="card-name">'+esc(a.locatario)+'</div>' : '')
      + parcelasHtml
      + (a.emManutencao ? '<div style="margin-top:4px"><span class="manut-badge">🔧 Manutenção</span></div>' : '')
      + '</div>';
  }).join('');
}

function setFiltro(f) {
  filtroAtivo = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('fb-' + f)?.classList.add('active');
  renderGrid();
}

// ─── DETALHE ──────────────────────────────────────────────
function abrirDetalhe(id) {
  const a = abrigos.find(x => x.id === id);
  const st = calcStatus(a);
  renderDetalhe(a, st, 'dados');
  abrir('overlayDetalhe');
}

function renderDetalhe(a, st, tabAtiva = 'dados') {
  const panel = document.getElementById('panelDetalhe');
  const infoRows = [
    ['Locatário', a.locatario], ['CPF/CNPJ', a.doc], ['Telefone', a.tel],
    ['Endereço da Obra', a.endereco],
    ['Funcionário Entregou', a.funcEntregou], ['Funcionário Recolheu', a.funcRecolheu],
    ['Data Locação', a.dataLocacao ? fmtDate(a.dataLocacao) : ''],
    ['Valor Mensal', a.valorMensal ? 'R$ ' + a.valorMensal : ''],
    ['Multa por Atraso', a.multaAtraso ? 'R$ ' + a.multaAtraso : ''],
    ['Devolução Prevista', a.dataDevolucaoPrevista ? fmtDate(a.dataDevolucaoPrevista) : ''],
    ['Observações', a.obs]
  ].filter(([, v]) => v);

  // Parcelas HTML
  const hoje = new Date(); hoje.setHours(0, 0, 0, 0);
  const parcelasHtml = (a.parcelas || []).map(p => {
    const dias = p.status === 'atrasado' ? Math.floor((hoje - new Date(p.vencimento + 'T00:00:00')) / 86400000) : 0;
    const multaVal = (dias > 0 && a.multaAtraso) ? (parseFloat(a.multaAtraso) * Math.ceil(dias / 30)).toFixed(2) : null;
    const statusLabel = p.status === 'pago' ? 'Pago' : p.status === 'atrasado' ? 'Atrasado' : 'Pendente';
    const atrasoSpan = p.status === 'atrasado' ? '<span style="color:var(--red)">'+dias+' dia'+(dias>1?'s':'')+' de atraso</span>' : '';
        const pgtoDiv = p.status === 'pago' ? '<div class="parcela-pgto">✓ Pago em '+p.dataPagamento+' via '+p.formaPagamento+(p.valorPago?' · R$ '+p.valorPago:'')+(p.obs?' · '+esc(p.obs):'')+' <button onclick="gerarRecibo('+a.id+','+p.id+')" style="background:none;border:none;color:var(--purple);cursor:pointer;font-size:11px;margin-left:6px">🖨 Recibo</button> <button onclick="editarParcela('+a.id+','+p.id+')" style="background:none;border:none;color:var(--blue);cursor:pointer;font-size:11px;margin-left:4px">✏️ Editar</button></div>' : '';
    const multaDiv = multaVal ? '<div class="parcela-multa">Multa estimada: R$ '+multaVal+'</div>' : '';
    const pagarBtn = p.status !== 'pago' ? '<button class="btn-pagar" onclick="abrirPagamento('+a.id+','+p.id+')">Registrar Pagamento</button>' : '';
    return '<div class="parcela-item '+p.status+'">'
      + '<div class="parcela-top"><span class="parcela-num">Parcela '+p.id+'</span><span class="parcela-badge '+p.status+'">'+statusLabel+'</span></div>'
      + '<div class="parcela-info"><span>Venc: '+fmtDate(p.vencimento)+'</span>'+atrasoSpan+'</div>'
      + pgtoDiv + multaDiv + pagarBtn
      + '</div>';
  }).join('') || '<div style="color:var(--muted);font-size:13px">Nenhuma parcela gerada.</div>';

  const btnMaisParcelas = a.status !== 'disponivel'
    ? '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border2)">'
      + '<button class="btn btn-blue btn-sm" onclick="abrirAdicionarParcelas('+a.id+')">+ Adicionar mais parcelas</button>'
      + '<span style="font-size:11px;color:var(--muted);margin-left:10px">Total: '+(a.parcelas||[]).length+' parcelas</span>'
      + '</div>'
    : '';

  // Histórico HTML
  const histHtml = (a.historico || []).map(h =>
    '<div class="hist-item">'
    + '<div class="hist-tipo '+h.tipo+'">'+h.tipo+'</div>'
    + '<div class="hist-date">'+h.data+'</div>'
    + '<div class="hist-desc">'+esc(h.desc)+'</div>'
    + (h.obs ? '<div class="hist-obs">Obs: '+esc(h.obs)+'</div>' : '')
    + '</div>'
  ).join('') || '<div style="color:var(--muted);font-size:13px">Nenhum histórico.</div>';

  // Anexos HTML
    const anexosHtml = '<div class="anexo-drop" id="dropZone-'+a.id+'" onclick="document.getElementById(\'fileInput-'+a.id+'\').click()" ondragover="event.preventDefault();this.classList.add(\'drag\')" ondragleave="this.classList.remove(\'drag\')" ondrop="handleDrop(event,'+a.id+')">'
    + '<div class="anexo-drop-text">📎 Clique ou arraste arquivos aqui<br><span style=\"font-size:11px\">Contrato, fotos, comprovantes...</span></div>'
    + '<input type="file" id="fileInput-'+a.id+'" style="display:none" multiple onchange="uploadAnexos('+a.id+',this.files)">'
    + '</div>'
    + ((a.anexos||[]).length === 0
      ? '<div style="color:var(--muted);font-size:13px">Nenhum anexo.</div>'
      : (a.anexos||[]).map(ax =>
          '<div class="anexo-item">'
          + '<div><div><a class="anexo-nome" href="'+ax.url+'" target="_blank">📄 '+esc(ax.nome)+'</a></div>'
          + '<div class="anexo-meta">'+ax.data+' · '+ax.tamanho+'</div></div>'
          + '<button class="anexo-del" onclick="deletarAnexo('+a.id+',\''+ax.id+'\')">×</button>'
          + '</div>'
        ).join('')
    );

  let actions = '';
  if (st === 'disponivel') {
    actions = '<button class="btn btn-green btn-sm" onclick="fechar(\'overlayDetalhe\');abrirModal(\'alugar\','+a.id+')">+ Alugar Abrigo</button>';
    if ((a.historico||[]).some(h => h.tipo === 'devolucao'))
      actions += ' <button class="btn btn-sm" style="background:#1a2030;border:1px solid #2a4080;color:#8be9fd" onclick="gerarFichaDevolucao('+a.id+',\'' +(a.funcRecolheu||'')+ '\',\'\')" title="Reimprimir última ficha de devolução">📄 Dev.</button>';
  }
  else if (st === 'alugado' || st === 'atraso') actions = '<button class="btn btn-yellow btn-sm" onclick="abrirModal(\'retirada\','+a.id+')">Solicitar Retirada</button>'
    + ' <button class="btn btn-purple btn-sm" onclick="solicitarEntrega('+a.id+')">📦 Ag. Entrega</button>'
    + ' <button class="btn btn-blue btn-sm" onclick="abrirModal(\'editarLocacao\','+a.id+')">Editar Dados</button>'
    + ' <button class="btn btn-sm" style="background:#1a2a1a;border:1px solid #2a5a2a;color:#50fa7b" onclick="abrirTransferencia('+a.id+')">🔄 Transferir</button>'
    + ' <button class="btn btn-sm" style="background:#1a2030;border:1px solid #2a4080;color:#8be9fd" onclick="gerarFichaLocacao('+a.id+')">📄 Ficha</button>';
  else if (st === 'retirada') actions = '<button class="btn btn-red btn-sm" onclick="abrirModal(\'devolver\','+a.id+')">Confirmar Devolução</button>'
    + ' <button class="btn btn-blue btn-sm" onclick="abrirModal(\'editarLocacao\','+a.id+')">Editar Dados</button>'
    + ' <button class="btn btn-cancel btn-sm" onclick="cancelarRetirada('+a.id+')">↩ Cancelar Retirada</button>'
    + ' <button class="btn btn-sm" style="background:#1a2030;border:1px solid #2a4080;color:#8be9fd" onclick="gerarFichaLocacao('+a.id+')">📄 Entrega</button>';
  else if (st === 'aguardando') actions = '<button class="btn btn-green btn-sm" onclick="confirmarEntrega('+a.id+')">✓ Confirmar Entrega</button>'
    + ' <button class="btn btn-red btn-sm" onclick="cancelarLocacao('+a.id+')">✕ Cancelar Locação</button>'
    + ' <button class="btn btn-sm" style="background:#1a2030;border:1px solid #2a4080;color:#8be9fd" onclick="gerarFichaLocacao('+a.id+')">📄 Ficha</button>';
  actions += ' <button class="btn btn-sm" style="background:var(--purple-bg);border:1px solid var(--purple-border);color:var(--purple)" onclick="toggleManutencao('+a.id+')">'+( a.emManutencao ? '✓ Em Manutenção' : '🔧 Manutenção')+'</button>';

  const tabDados = tabAtiva === 'dados' ? 'active' : '';
  const tabParc = tabAtiva === 'parcelas' ? 'active' : '';
  const tabHist = tabAtiva === 'historico' ? 'active' : '';
  const tabAnex = tabAtiva === 'anexos' ? 'active' : '';
  const atrasCount = (a.parcelas || []).filter(p => p.status === 'atrasado').length;
  const anexCount = (a.anexos||[]).length;
  const infoHtml = infoRows.length
    ? '<div class="info-block">' + infoRows.map(([k,v]) => '<div class="info-row"><span class="info-key">'+k+'</span><span class="info-val">'+esc(v)+'</span></div>').join('') + '</div>'
    : '<div style="color:var(--muted);font-size:13px">Abrigo disponível.</div>';

  panel.innerHTML = ''
    + '<div class="panel-header">'
    +   '<div><div class="panel-title">Abrigo #'+a.num+'</div><div class="panel-sub">'+STATUS_LABEL[st]+'</div></div>'
    +   '<button class="close-btn" onclick="fechar(\'overlayDetalhe\')">×</button>'
    + '</div>'
    + '<div class="panel-body">'
    +   '<div class="action-row">'+actions+'</div>'
    +   '<div class="tabs">'
    +     '<button class="tab '+tabDados+'" onclick="switchTab('+a.id+',\'dados\')">Dados</button>'
    +     '<button class="tab '+tabParc+'" onclick="switchTab('+a.id+',\'parcelas\')">Parcelas '+(atrasCount>0?'🔴':'')+'</button>'
    +     '<button class="tab '+tabHist+'" onclick="switchTab('+a.id+',\'historico\')">Histórico</button>'
    +     '<button class="tab '+tabAnex+'" onclick="switchTab('+a.id+',\'anexos\')">Anexos'+(anexCount>0?' ('+anexCount+')':'')+'</button>'
    +   '</div>'
    +   '<div class="tab-content '+tabDados+'" id="tab-dados">'+infoHtml+'</div>'
    +   '<div class="tab-content '+tabParc+'" id="tab-parcelas">'+parcelasHtml+btnMaisParcelas+'</div>'
    +   '<div class="tab-content '+tabHist+'" id="tab-historico">'+histHtml+'</div>'
    +   '<div class="tab-content '+tabAnex+'" id="tab-anexos">'+anexosHtml+'</div>'
    + '</div>';

async function confirmarAlugar(id) {
  const loc = v('f-loc'), tel = v('f-tel'), end = v('f-end'), dloc = v('f-dloc'), val = v('f-val');
  if (!loc || !tel || !end || !dloc || !val) { alert('Preencha os campos obrigatórios (*)'); return; }
  const a = abrigos.find(x => x.id === id);
  Object.assign(a, {
    status: 'aguardando', locatario: loc, doc: v('f-doc'), tel, endereco: end,
    funcEntregou: '', dataLocacao: dloc, valorMensal: val, formaPagamento: v('f-forma'),
    multaAtraso: v('f-multa'), dataDevolucaoPrevista: v('f-ddev'), obs: v('f-obs'),
    parcelas: gerarParcelas(dloc)
  });
  a.historico.unshift({ tipo: 'locacao', data: hoje(), desc: 'Locação cadastrada para '+loc+' — '+end+'. Aguardando entrega do abrigo.', obs: v('f-obs') });
  addLog('locacao', 'Abrigo #'+a.num+' locado para '+loc, a.num);
  fechar('overlayModal'); renderGrid();
  setTimeout(() => { renderDetalhe(a, calcStatus(a), 'dados'); abrir('overlayDetalhe'); }, 150);
  await salvar();
}

async function confirmarEdicao(id) {

  await salvar();
}

async function confirmarDevolver(id) {
  const a = abrigos.find(x => x.id === id);
  const funcRec = v('f-func-rec'), obs = v('f-obs-dev');
  const parcelasAbertas = (a.parcelas || []).filter(p => p.status !== 'pago');

  if (parcelasAbertas.length > 0) {
    // Show options for pending parcelas
    const panel = document.getElementById('panelModal');
    const totalDevido = parcelasAbertas.reduce((sum, p) => sum + parseFloat(a.valorMensal || 0), 0).toFixed(2);
    panel.innerHTML = ''
      + '<div class="panel-header">'
      +   '<div><div class="panel-title">Parcelas em Aberto</div>'
      +   '<div class="panel-sub">Abrigo #'+a.num+' · '+esc(a.locatario)+'</div></div>'
      +   '<button class="close-btn" onclick="fechar(\'overlayModal\')">×</button>'
      + '</div>'
      + '<div class="panel-body">'
      +   '<p class="confirm-text">Este cliente possui <strong style="color:var(--red)">'+parcelasAbertas.length+' parcela(s) em aberto</strong> totalizando aproximadamente <strong style="color:var(--red)">R$ '+totalDevido+'</strong>.</p>'
      +   '<p class="confirm-text">O que deseja fazer com essas pendências?</p>'
      +   '<div style="display:flex;flex-direction:column;gap:10px;margin-top:16px">'
      +     '<button class="btn btn-red" onclick="finalizarDevolucao('+id+',\'manter\',\''+funcRec+'\',\''+obs+'\')">⚠️ Manter dívida — liberar abrigo e registrar débito do cliente</button>'
      +     '<button class="btn btn-green" onclick="finalizarDevolucao('+id+',\'baixar\',\''+funcRec+'\',\''+obs+'\')">✓ Baixar tudo — considerar quitado e liberar abrigo</button>'
      +     '<button class="btn btn-cancel" onclick="fechar(\'overlayModal\')">Cancelar</button>'
      +   '</div>'
      + '</div>';
    return;
  }

  await finalizarDevolucao(id, 'baixar', funcRec, obs);
}

async function finalizarDevolucao(id, opcao, funcRec, obs) {
  const a = abrigos.find(x => x.id === id);
  const parcelasAbertas = (a.parcelas || []).filter(p => p.status !== 'pago');

  if (opcao === 'manter' && parcelasAbertas.length > 0) {
    // Save divida record
    if (!a.dividas) a.dividas = [];
    const totalDevido = parcelasAbertas.reduce((sum, p) => sum + parseFloat(a.valorMensal || 0), 0);
    a.dividas.push({
      id: Date.now(),
      locatario: a.locatario,
      doc: a.doc || '',
      tel: a.tel || '',
      dataLocacao: a.dataLocacao,
      dataDevolucao: hoje(),
      valorMensal: a.valorMensal,
      parcelasAbertas: parcelasAbertas.length,
      totalEstimado: totalDevido.toFixed(2),
      parcelas: parcelasAbertas,
      status: 'pendente', // pendente | quitado
      obs: obs || ''
    });
    a.historico.unshift({ tipo: 'devolucao', data: hoje(), desc: 'Devolvido com '+parcelasAbertas.length+' parcela(s) em aberto. Dívida registrada para '+a.locatario+'. Total estimado: R$ '+totalDevido.toFixed(2), obs });
  } else {
    // Baixar tudo — mark all open parcelas as paid today
    if (parcelasAbertas.length > 0) {
      const forma = prompt('Forma de pagamento das parcelas quitadas? (PIX / Dinheiro / Boleto / Cartão)', 'Dinheiro') || 'Dinheiro';
      parcelasAbertas.forEach(p => {
        p.status = 'pago';
        p.dataPagamento = hoje();
        p.formaPagamento = forma;
        p.valorPago = a.valorMensal || '';
      });
      const total = (parcelasAbertas.length * parseFloat(a.valorMensal || 0)).toFixed(2);
      a.historico.unshift({ tipo: 'pagamento', data: hoje(), desc: parcelasAbertas.length+' parcela(s) quitada(s) na devolução via '+forma+'. Total: R$ '+total, obs });
      // Offer recibo
      const gerarRec = confirm('Parcelas quitadas! Deseja gerar o recibo de quitação agora?');
      if (gerarRec) {
        setTimeout(() => gerarReciboDevolucao(a.num, a.locatario, a.doc, a.endereco, parcelasAbertas, a.valorMensal, forma, total), 500);
      }
    }
    addLog('devolucao', 'Abrigo #'+a.num+' devolvido. Cliente: '+a.locatario+(funcRec?' | Recolhido por: '+funcRec:''), a.num);
  a.historico.unshift({ tipo: 'devolucao', data: hoje(), desc: 'Devolvido. Locatário: '+a.locatario+' — '+a.endereco+(funcRec?' | Recolhido por: '+funcRec:''), obs });
  }

  // Arquivar anexos em subpasta histórico
  await arquivarAnexos(a);

  Object.assign(a, {
    status: 'disponivel', locatario: '', doc: '', tel: '', endereco: '',
    funcEntregou: '', funcRecolheu: funcRec, dataLocacao: '', valorMensal: '',
    multaAtraso: '', dataDevolucaoPrevista: '', obs: '', parcelas: a.parcelas
  });
  const abrigoId = a.id, funcRec2 = funcRec, obs2 = obs;
  fechar('overlayModal'); fechar('overlayDetalhe'); renderGrid();
  await salvar();
  const gerarFicha = confirm('Devolução registrada! Deseja gerar a Ficha de Devolução agora?');
  if (gerarFicha) setTimeout(() => gerarFichaDevolucao(abrigoId, funcRec2, obs2), 300);
}

    });

  a.historico.unshift({ tipo: 'renovacao', data: hoje(), desc: qtd+' parcela'+(qtd>1?'s':'')+' adicionada'+(qtd>1?'s':'')+'. Total: '+a.parcelas.length+' parcelas.', obs: '' });

// ─── ANEXOS ───────────────────────────────────────────────
function handleDrop(e, id) {
  e.preventDefault();
  document.getElementById('dropZone-' + id)?.classList.remove('drag');
  uploadAnexos(id, e.dataTransfer.files);
}

async function uploadAnexos(id, files) {
  const a = abrigos.find(x => x.id === id);
  if (!a.anexos) a.anexos = [];
  for (const file of files) {
    try {
      const path = `abrigos-anexos/abrigo-${a.num}/${Date.now()}-${file.name}`;
      const res = await gFetch(`/drives/${DRIVE_ID}/root:/${path}:/content`, {
        method: 'PUT',
        headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': file.type || 'application/octet-stream' },
        body: file
      });
      const data = await res.json();
      a.anexos.push({
        id: data.id,
        nome: file.name,
        url: data.webUrl,
        data: hoje(),
        tamanho: formatBytes(file.size)
      });
    } catch(e) { alert('Erro ao enviar ' + file.name); }
  }
  renderDetalhe(a, calcStatus(a), 'anexos');
  await salvar();
}

async function deletarAnexo(abrigoId, anexoId) {
  if (!confirm('Remover este anexo?')) return;
  const a = abrigos.find(x => x.id === abrigoId);
  try {
    await gFetch(`/drives/${DRIVE_ID}/items/${anexoId}`, { method: 'DELETE' });
  } catch(e) {}
  a.anexos = (a.anexos || []).filter(ax => ax.id !== anexoId);
  renderDetalhe(a, calcStatus(a), 'anexos');
  await salvar();
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

// ─── RECIBO ───────────────────────────────────────────────
function gerarRecibo(abrigoId, parcelaId) {
  const a = abrigos.find(x => x.id === abrigoId);
  const p = a.parcelas.find(x => x.id === parcelaId);
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Recibo</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'IBM Plex Sans',sans-serif;padding:40px;max-width:600px;margin:0 auto;color:#111}
    h1{font-size:20px;text-align:center;margin-bottom:4px}
    .sub{text-align:center;color:#666;font-size:12px;margin-bottom:28px}
    .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #eee;font-size:13px}
    .key{color:#666}.val{font-weight:500}
    .total{font-size:16px;font-weight:700;color:#111;margin-top:16px;text-align:right}
    .assin{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:48px}
    .assin-line{border-top:1px solid #333;padding-top:8px;font-size:11px;color:#666;text-align:center}
    .footer{text-align:center;font-size:10px;color:#bbb;margin-top:32px}
    @media print{button{display:none}}</style></head><body>
    <h1>RECIBO DE PAGAMENTO</h1>
    <div class="sub">Grupo Vagula · Locação de Abrigo Móvel</div>

    <div class="row"><span class="key">Locatário</span><span class="val">${a.locatario}</span></div>
    <div class="row"><span class="key">CPF / CNPJ</span><span class="val">${a.doc || '—'}</span></div>
    <div class="row"><span class="key">Endereço da Obra</span><span class="val">${a.endereco}</span></div>
    <div class="row"><span class="key">Parcela Nº</span><span class="val">${p.id}</span></div>
    <div class="row"><span class="key">Vencimento</span><span class="val">${fmtDate(p.vencimento)}</span></div>
    <div class="row"><span class="key">Data do Pagamento</span><span class="val">${p.dataPagamento}</span></div>
    <div class="row"><span class="key">Forma de Pagamento</span><span class="val">${p.formaPagamento}</span></div>
    ${p.obs ? `<div class="row"><span class="key">Observações</span><span class="val">${p.obs}</span></div>` : ''}
    <div class="total">Valor Pago: R$ ${p.valorPago || a.valorMensal}</div>

      <div class="assin-line">Locador / Grupo Vagula</div>
      <div class="assin-line">Locatário: ${a.locatario}</div>

}

// ─── DASHBOARD FINANCEIRO ─────────────────────────────────
function abrirDashboard(filtroMes, filtroAno) {
  const panel = document.getElementById('panelDash');
  const hoje2 = new Date(); hoje2.setHours(0,0,0,0);
  const mesAtual = filtroMes !== undefined ? filtroMes : hoje2.getMonth();
  const anoAtual = filtroAno !== undefined ? filtroAno : hoje2.getFullYear();

  // Build month/year selector options
  const mesesNomes = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  let mesOpts = '';
  for (let m = 0; m < 12; m++) mesOpts += '<option value="'+m+'"'+(m===mesAtual?' selected':'')+'>'+mesesNomes[m]+'</option>';
  let anoOpts = '';
  for (let a = hoje2.getFullYear(); a >= hoje2.getFullYear()-3; a--) anoOpts += '<option value="'+a+'"'+(a===anoAtual?' selected':'')+'>'+a+'</option>';

  let totalReceber = 0, recebidoPeriodo = 0, inadimplencia = 0, totalOcupados = 0;
  const recebidoLista = [];
  // Acumulado anual por mês
  const recebidoPorMes = Array(12).fill(0);

  abrigos.forEach(a => {
    const st = calcStatus(a);
    if (st !== 'disponivel') totalOcupados++;
    (a.parcelas || []).forEach(p => {
      const val = parseFloat(p.valorPago || a.valorMensal || 0);
      if (p.status !== 'pago') {
        const v = new Date(p.vencimento + 'T00:00:00');
        if (v <= hoje2) inadimplencia += parseFloat(a.valorMensal || 0);
        else totalReceber += parseFloat(a.valorMensal || 0);
      } else {
        const parts = p.dataPagamento.split('/');
        if (parts.length === 3) {
          const d = new Date(parts[2]+'-'+parts[1]+'-'+parts[0]);
          if (d.getFullYear() === anoAtual) {
            recebidoPorMes[d.getMonth()] += val;
            if (d.getMonth() === mesAtual) {
              recebidoPeriodo += val;
              recebidoLista.push({ abrigoNum: a.num, locatario: a.locatario, parcela: p.id, valor: val, forma: p.formaPagamento, data: p.dataPagamento });
            }
          }
        }
      }
    });
  });

  const taxaOcup = Math.round((totalOcupados / TOTAL) * 100);
  const totalAnual = recebidoPorMes.reduce((s,v) => s+v, 0);

  // Bar chart por mês
  const maxBar = Math.max(...recebidoPorMes, 1);
  const barChart = '<div style="display:grid;grid-template-columns:repeat(12,1fr);gap:4px;align-items:end;height:60px;margin:12px 0 4px">'
    + recebidoPorMes.map((v, i) => {
        const h = Math.round((v / maxBar) * 100);
        const cor = i === mesAtual ? 'var(--green)' : 'var(--border2)';
        return '<div style="display:flex;flex-direction:column;align-items:center;gap:2px">'
          + '<div style="width:100%;background:'+cor+';height:'+h+'%;border-radius:3px 3px 0 0;min-height:2px;cursor:pointer" onclick="abrirDashboard('+i+','+anoAtual+')" title="'+mesesNomes[i]+': R$ '+v.toFixed(2)+'"></div>'
          + '<div style="font-size:9px;color:var(--muted)">'+mesesNomes[i]+'</div>'
        + '</div>';
      }).join('')
    + '</div>';

  const taxaInad = totalAnual > 0 ? Math.round((inadimplencia / (totalAnual + inadimplencia)) * 100) : 0;

  // Dívidas pendentes
  const todasDividas = [];
  abrigos.forEach(a => (a.dividas||[]).filter(d => d.status === 'pendente').forEach(d => todasDividas.push({...d, abrigoNum: a.num, abrigoId: a.id})));
  const dividasHtml = todasDividas.length > 0
    ? '<div class="info-block"><div class="info-block-title" style="color:var(--red)">⚠️ Dívidas Pendentes ('+todasDividas.length+') · R$ '+todasDividas.reduce((s,d)=>s+parseFloat(d.totalEstimado||0),0).toFixed(2)+'</div>'
      + todasDividas.map(d =>
          '<div class="alert-venc">'
          + '<div class="alert-venc-info"><strong>Abrigo #'+d.abrigoNum+'</strong> · '+esc(d.locatario)+'<br>'
          + '<span style="font-size:11px;color:var(--muted)">'+d.parcelasAbertas+' parcela(s) · Devolvido em '+d.dataDevolucao+'</span></div>'
          + '<div style="text-align:right"><span style="color:var(--red);font-family:var(--font-mono);font-size:13px">R$ '+d.totalEstimado+'</span><br>'
          + '<button class="btn-pagar" style="margin-top:4px" onclick="abrirGerenciarDivida('+d.abrigoId+','+d.id+')">Gerenciar</button></div>'
          + '</div>'
        ).join('')
      + '</div>'
    : '';

  const listaRecebido = recebidoLista.length > 0
    ? recebidoLista.map(r =>
        '<div class="info-row">'
        + '<span class="info-key">#'+r.abrigoNum+' '+esc(r.locatario)+' · Parc.'+r.parcela+' · '+r.data+'</span>'
        + '<span class="info-val" style="color:var(--green)">R$ '+r.valor.toFixed(2)+' · '+r.forma+'</span>'
        + '</div>'
      ).join('')
    : '<div style="color:var(--muted);font-size:13px">Nenhum pagamento neste período.</div>';

  const nomeMes = new Date(anoAtual, mesAtual, 1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  panel.innerHTML = ''
    + '<div class="panel-header">'
    +   '<div><div class="panel-title">📊 Resumo Financeiro</div><div class="panel-sub">'+nomeMes+'</div></div>'
    +   '<button class="close-btn" onclick="fechar(\'overlayDash\')">×</button>'
    + '</div>'
    + '<div class="panel-body">'
    +   '<div style="display:flex;gap:8px;margin-bottom:16px;align-items:center">'
    +     '<select class="form-select" style="flex:1" onchange="abrirDashboard(parseInt(this.value),'+anoAtual+')">'+mesOpts+'</select>'
    +     '<select class="form-select" style="width:90px" onchange="abrirDashboard('+mesAtual+',parseInt(this.value))">'+anoOpts+'</select>'
    +   '</div>'
    +   '<div class="fin-grid">'
    +     '<div class="fin-card"><div class="fin-num" style="color:var(--green)">R$ '+recebidoPeriodo.toFixed(2)+'</div><div class="fin-label">Recebido em '+mesesNomes[mesAtual]+'</div></div>'
    +     '<div class="fin-card"><div class="fin-num" style="color:var(--red)">R$ '+inadimplencia.toFixed(2)+'</div><div class="fin-label">Inadimplência atual</div></div>'
    +     '<div class="fin-card"><div class="fin-num" style="color:var(--blue)">R$ '+totalAnual.toFixed(2)+'</div><div class="fin-label">Total recebido '+anoAtual+'</div></div>'
    +   '</div>'
    +   '<div class="fin-card" style="margin-bottom:16px">'
    +     '<div style="display:flex;justify-content:space-between;margin-bottom:2px">'
    +       '<span class="fin-label">Recebido por mês em '+anoAtual+' (clique no mês)</span>'
    +       '<span style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">Total: R$ '+totalAnual.toFixed(2)+'</span>'
    +     '</div>'
    +     barChart
    +   '</div>'
    +   '<div class="fin-card" style="margin-bottom:16px">'
    +     '<div style="display:flex;justify-content:space-between;margin-bottom:6px">'
    +       '<span class="fin-label">Taxa de Ocupação</span>'
    +       '<span style="font-family:var(--font-mono);font-size:13px;color:var(--green)">'+taxaOcup+'% · '+totalOcupados+'/'+TOTAL+' abrigos</span>'
    +     '</div>'
    +     '<div class="ocup-bar-wrap"><div class="ocup-bar" style="width:'+taxaOcup+'%"></div></div>'
    +   '</div>'
    +   '<div class="info-block"><div class="info-block-title">Recebimentos — '+nomeMes+'</div>'+listaRecebido+'</div>'
    +   dividasHtml
    + '</div>';
  abrir('overlayDash');
}

// ─── VENCIMENTOS ──────────────────────────────────────────
function abrirVencimentos() {
  const panel = document.getElementById('panelVenc');
  const hoje2 = new Date(); hoje2.setHours(0,0,0,0);
  const em7dias = new Date(hoje2); em7dias.setDate(em7dias.getDate() + 7);

  const alertas = [];
  abrigos.forEach(a => {
    (a.parcelas || []).forEach(p => {
      if (p.status === 'pago') return;
      const v = new Date(p.vencimento + 'T00:00:00');
      const diff = Math.ceil((v - hoje2) / 86400000);
      if (diff <= 7) {
        alertas.push({ a, p, diff, v });
      }
    });
  });
  alertas.sort((x, y) => x.diff - y.diff);

  const atrasados = alertas.filter(x => x.diff < 0);
  const hoje3 = alertas.filter(x => x.diff === 0);
  const proximos = alertas.filter(x => x.diff > 0);

  function renderAlerta(x) {
    const cor = x.diff < 0 ? 'var(--red)' : x.diff === 0 ? 'var(--yellow)' : 'var(--text)';
    const label = x.diff < 0 ? `${Math.abs(x.diff)} dia${Math.abs(x.diff)>1?'s':''} de atraso` : x.diff === 0 ? 'Vence hoje!' : `Vence em ${x.diff} dia${x.diff>1?'s':''}`;
    return `<div class="alert-venc">
      <div class="alert-venc-info">
        <strong>Abrigo #${x.a.num}</strong> · ${esc(x.a.locatario)}<br>
        <span style="font-size:11px;color:var(--muted)">Parcela ${x.p.id} · R$ ${x.a.valorMensal || '—'}</span>
      </div>
      <div>
        <div class="alert-venc-dias" style="color:${cor}">${label}</div>
        <button class="btn-pagar" style="margin-top:4px" onclick="fechar('overlayVenc');abrirDetalhe(${x.a.id})">Ver abrigo</button>
      </div>
    </div>`;
  }

  panel.innerHTML = `
    <div class="panel-header">
      <div><div class="panel-title">🔔 Vencimentos</div><div class="panel-sub">Próximos 7 dias e atrasados</div></div>
      <button class="close-btn" onclick="fechar('overlayVenc')">×</button>
    </div>
    <div class="panel-body">
      ${atrasados.length ? `<div class="info-block-title" style="color:var(--red);margin-bottom:10px">Em atraso (${atrasados.length})</div>${atrasados.map(renderAlerta).join('')}` : ''}
      ${hoje3.length ? `<div class="info-block-title" style="color:var(--yellow);margin:12px 0 10px">Vence hoje (${hoje3.length})</div>${hoje3.map(renderAlerta).join('')}` : ''}
      ${proximos.length ? `<div class="info-block-title" style="margin:12px 0 10px">Próximos 7 dias (${proximos.length})</div>${proximos.map(renderAlerta).join('')}` : ''}
      ${alertas.length === 0 ? '<div style="color:var(--muted);font-size:13px;text-align:center;padding:32px 0">✅ Nenhum vencimento nos próximos 7 dias!</div>' : ''}
    </div>`;
  abrir('overlayVenc');
}


// ─── GERENCIAR DÍVIDA ─────────────────────────────────────
function abrirGerenciarDivida(abrigoId, dividaId) {
  const a = abrigos.find(x => x.id === abrigoId);
  const d = (a.dividas||[]).find(x => x.id === dividaId);
  if (!d) return;
  const panel = document.getElementById('panelDash');

  const parcelasHtml = (d.parcelas||[]).map(p => {
    const statusLabel = p.status === 'pago' ? 'Pago' : p.status === 'atrasado' ? 'Atrasado' : 'Pendente';
    const pgtoInfo = p.status === 'pago' ? ' · Pago em '+p.dataPagamento+' via '+p.formaPagamento+(p.valorPago?' · R$ '+p.valorPago:'') : '';
    const btnPagar = p.status !== 'pago' ? '<button class="btn-pagar" onclick="pagarParcelaDivida('+abrigoId+','+dividaId+','+p.id+')">Registrar Pagamento</button>' : '';
    return '<div class="parcela-item '+p.status+'">'
      + '<div class="parcela-top"><span class="parcela-num">Parcela '+p.id+'</span><span class="parcela-badge '+p.status+'">'+statusLabel+'</span></div>'
      + '<div class="parcela-info"><span>Venc: '+fmtDate(p.vencimento)+'</span></div>'
      + (p.status === 'pago' ? '<div class="parcela-pgto">✓'+pgtoInfo+'</div>' : '')
      + btnPagar + '</div>';
  }).join('');

  panel.innerHTML = ''
    + '<div class="panel-header">'
    +   '<div><div class="panel-title">Dívida — '+esc(d.locatario)+'</div>'
    +   '<div class="panel-sub">Abrigo #'+a.num+' · Devolvido em '+d.dataDevolucao+'</div></div>'
    +   '<button class="close-btn" onclick="abrirDashboard()">←</button>'
    + '</div>'
    + '<div class="panel-body">'
    +   '<div class="fin-card" style="margin-bottom:16px">'
    +     '<div class="info-row"><span class="info-key">Locatário</span><span class="info-val">'+esc(d.locatario)+'</span></div>'
    +     '<div class="info-row"><span class="info-key">Telefone</span><span class="info-val">'+(d.tel||'—')+'</span></div>'
    +     '<div class="info-row"><span class="info-key">Total estimado</span><span class="info-val" style="color:var(--red)">R$ '+d.totalEstimado+'</span></div>'
    +   '</div>'
    +   '<div class="info-block-title" style="margin-bottom:10px">Parcelas em aberto</div>'
    +   parcelasHtml
    +   '<div style="margin-top:16px;display:flex;gap:10px">'
    +     '<button class="btn btn-green btn-sm" onclick="quitarDivida('+abrigoId+','+dividaId+')">✓ Marcar tudo como quitado</button>'
    +     '<button class="btn btn-cancel btn-sm" onclick="abrirDashboard()">Voltar</button>'
    +   '</div>'
    + '</div>';
}

async function pagarParcelaDivida(abrigoId, dividaId, parcelaId) {
  const a = abrigos.find(x => x.id === abrigoId);
  const d = (a.dividas||[]).find(x => x.id === dividaId);
  const p = (d.parcelas||[]).find(x => x.id === parcelaId);
  const forma = prompt('Forma de pagamento (PIX/Dinheiro/Boleto/Cartão):');
  if (!forma) return;
  const valor = prompt('Valor pago (R$):', d.valorMensal || '');
  p.status = 'pago';
  p.dataPagamento = hoje();
  p.formaPagamento = forma;
  p.valorPago = valor || d.valorMensal || '';
  // Check if all paid
  const todasPagas = d.parcelas.every(x => x.status === 'pago');
  if (todasPagas) d.status = 'quitado';
  a.historico.unshift({ tipo: 'pagamento', data: hoje(), desc: 'Pagamento de dívida — '+esc(d.locatario)+' · Parcela '+parcelaId+(valor?' · R$ '+valor:''), obs: '' });
  await salvar();
  abrirGerenciarDivida(abrigoId, dividaId);
}

async function quitarDivida(abrigoId, dividaId) {
  if (!confirm('Marcar toda a dívida como quitada?')) return;
  const a = abrigos.find(x => x.id === abrigoId);
  const d = (a.dividas||[]).find(x => x.id === dividaId);
  d.status = 'quitado';
  d.parcelas.forEach(p => { if (p.status !== 'pago') { p.status = 'pago'; p.dataPagamento = hoje(); p.formaPagamento = 'Quitado'; } });
  a.historico.unshift({ tipo: 'pagamento', data: hoje(), desc: 'Dívida de '+esc(d.locatario)+' marcada como quitada. Total: R$ '+d.totalEstimado, obs: '' });
  await salvar();
  abrirDashboard();
}


// ─── AGUARDANDO ENTREGA ───────────────────────────────────
async function solicitarEntrega(id) {
  if (!confirm('Marcar abrigo como "Aguardando Entrega"?\nEle ficará roxo até ser entregue ao cliente.')) return;
  const a = abrigos.find(x => x.id === id);
  a.status = 'aguardando';
  a.historico.unshift({ tipo: 'renovacao', data: hoje(), desc: 'Entrega solicitada. Abrigo aguardando ser levado ao cliente.', obs: '' });
  renderDetalhe(a, calcStatus(a), 'dados');
  renderGrid();
  await salvar();
}

    + '<button class="btn btn-green" onclick="confirmarEntregaSalvar('+id+')">✓ Confirmar Entrega</button>'
    + '</div></div>';
  abrir('overlayModal');
}

async function confirmarEntregaSalvar(id) {
  const func = document.getElementById('ce-func').value.trim();
  if (!func) { alert('Informe o funcionário que fez a entrega.'); return; }
  const recebeu = document.getElementById('ce-recebeu').value.trim();
  const obs = document.getElementById('ce-obs').value.trim();
  const a = abrigos.find(x => x.id === id);
  a.status = 'alugado';
  a.funcEntregou = func;
  a.funcRecebeu = recebeu;
  const desc = 'Abrigo entregue por: '+func+(recebeu ? ' · Recebeu: '+recebeu : '')+(obs?' · '+obs:'');
  a.historico.unshift({ tipo: 'renovacao', data: hoje(), desc, obs });
  addLog('entrega', 'Abrigo #'+a.num+' entregue a '+a.locatario+' por '+func, a.num);
  fechar('overlayModal');
  renderDetalhe(a, calcStatus(a), 'dados');
  renderGrid();
  await salvar();
  const gerarFicha = confirm('Entrega confirmada! Deseja gerar a Ficha de Entrega agora?');
  if (gerarFicha) setTimeout(() => gerarFichaLocacao(a.id), 300);
}

function cancelarLocacao(id) {
  const a = abrigos.find(x => x.id === id);
  const panel = document.getElementById('panelModal');
  panel.innerHTML = ''
    + '<div class="panel-header"><div><div class="panel-title">Cancelar Locação — Abrigo #'+a.num+'</div>'
    + '<div class="panel-sub">'+esc(a.locatario)+'</div></div>'

async function confirmarCancelamento(id) {
  const a = abrigos.find(x => x.id === id);
  const obs = document.getElementById('cancel-obs').value.trim();
  const nomeAnt = a.locatario;
  a.historico.unshift({ tipo: 'devolucao', data: hoje(), desc: 'Locação cancelada antes da entrega. Cliente: '+nomeAnt+(obs?' · '+obs:''), obs });
  addLog('cancelamento', 'Locação do abrigo #'+a.num+' cancelada antes da entrega. Cliente: '+nomeAnt, a.num);
  Object.assign(a, {
    status: 'disponivel', locatario: '', doc: '', tel: '', endereco: '',
    funcEntregou: '', funcRecolheu: '', dataLocacao: '', valorMensal: '',
    multaAtraso: '', dataDevolucaoPrevista: '', obs: '', parcelas: []
  });
  fechar('overlayModal'); fechar('overlayDetalhe'); renderGrid();
  await salvar();
}

function editarParcela(abrigoId, parcelaId) {
  const a = abrigos.find(x => x.id === abrigoId);
  const p = a.parcelas.find(x => x.id === parcelaId);
  const panel = document.getElementById('panelModal');
  const formasOpts = FORMAS_PGTO.map(f => '<option'+(f===p.formaPagamento?' selected':'')+'>'+f+'</option>').join('');
  // Convert dd/mm/yyyy to yyyy-mm-dd for input
  let dataVal = '';
  if (p.dataPagamento) {
    const pts = p.dataPagamento.split('/');
    if (pts.length === 3) dataVal = pts[2]+'-'+pts[1]+'-'+pts[0];
  }
  panel.innerHTML = ''
    + '<div class="panel-header">'
    +   '<div><div class="panel-title">Editar Pagamento</div>'
    +   '<div class="panel-sub">Abrigo #'+a.num+' · Parcela '+p.id+'</div></div>'
    +   '<button class="close-btn" onclick="fechar(\'overlayModal\')">×</button>'
    + '</div>'
    + '<div class="panel-body">'
    +   '<div class="form-row">'
    +     '<div class="form-group"><label class="form-label">Data do Pagamento *</label><input class="form-input" type="date" id="ep-data" value="'+dataVal+'"></div>'
    +     '<div class="form-group"><label class="form-label">Forma de Pagamento *</label><select class="form-select" id="ep-forma">'+formasOpts+'</select></div>'
    +   '</div>'
    +   '<div class="form-group"><label class="form-label">Valor Pago (R$)</label><input class="form-input" type="number" step="0.01" id="ep-valor" value="'+(p.valorPago||'')+'" placeholder="'+(a.valorMensal||'')+'"></div>'
    +   '<div class="form-group"><label class="form-label">Observações</label><textarea class="form-textarea" id="ep-obs" rows="2">'+esc(p.obs||'')+'</textarea></div>'
    +   '<div class="form-footer">'
    +     '<button class="btn btn-cancel" onclick="fechar(\'overlayModal\')">Cancelar</button>'
    +     '<button class="btn btn-blue" onclick="confirmarEdicaoParcela('+abrigoId+','+parcelaId+')">Salvar Alterações</button>'
    +   '</div>'
    + '</div>';
  abrir('overlayModal');
}

async function confirmarEdicaoParcela(abrigoId, parcelaId) {
  const a = abrigos.find(x => x.id === abrigoId);
  const p = a.parcelas.find(x => x.id === parcelaId);
  const dataRaw = document.getElementById('ep-data').value;
  const forma = document.getElementById('ep-forma').value;
  if (!dataRaw || !forma) { alert('Preencha os campos obrigatórios'); return; }
  const oldInfo = 'Pago em '+p.dataPagamento+' via '+p.formaPagamento;
  p.dataPagamento = fmtDate(dataRaw);
  p.formaPagamento = forma;
  p.valorPago = document.getElementById('ep-valor').value || p.valorPago;
  p.obs = document.getElementById('ep-obs').value;
  a.historico.unshift({ tipo: 'pagamento', data: hoje(), desc: 'Parcela '+p.id+' editada. Antes: '+oldInfo+'. Agora: '+p.dataPagamento+' via '+p.formaPagamento, obs: '' });
  fechar('overlayModal');
  renderDetalhe(a, calcStatus(a), 'parcelas');
  renderGrid();
  await salvar();
}


// ─── ARQUIVAR ANEXOS NA DEVOLUÇÃO ─────────────────────────
async function arquivarAnexos(a) {
  if (!a.anexos || a.anexos.length === 0) return;
  // Pasta destino: abrigos-anexos/abrigo-XX/Histórico/NomeCliente - DD-MM-AAAA/
  const dataFmt = new Date().toLocaleDateString('pt-BR').replace(/\//g, '-');
  const nomeCliente = a.locatario.replace(/[^a-zA-Z0-9À-ÿ ]/g, '').trim();
  const pastaDestino = 'abrigos-anexos/abrigo-' + String(a.num).padStart(2,'0') + '/Histórico/' + nomeCliente + ' - ' + dataFmt;

  for (const ax of a.anexos) {
    try {
      // Move file via Graph API rename/patch
      const nomeArq = ax.nome || ax.name || ax.id;
      await gFetch('/drives/' + DRIVE_ID + '/items/' + ax.id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          parentReference: { path: '/drives/' + DRIVE_ID + '/root:/' + pastaDestino },
          name: nomeArq
        })
      });
    } catch(e) {
      console.warn('Não foi possível mover anexo:', ax.nome, e);
    }
  }
  // Clear anexos list from abrigo after archiving
  a.anexos = [];
}
