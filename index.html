// ─── TRANSFERÊNCIA DE ABRIGO ──────────────────────────────
function abrirTransferencia(id) {
  const a = abrigos.find(x => x.id === id);
  const panel = document.getElementById('panelModal');
  const disponiveis = abrigos.filter(x => x.status === 'disponivel' && !x.emManutencao);
  if (disponiveis.length === 0) {
    alert('Não há abrigos disponíveis para receber a transferência.');
    return;
  }
  const opts = disponiveis.map(x => '<option value="'+x.id+'">#'+x.num+'</option>').join('');
  panel.innerHTML = ''
    + '<div class="panel-header"><div><div class="panel-title">🔄 Transferir Locação</div>'
    + '<div class="panel-sub">Abrigo #'+a.num+' · '+esc(a.locatario)+'</div></div>'
    + '<button class="close-btn" onclick="fechar(\'overlayModal\')">×</button></div>'
    + '<div class="panel-body">'
    + '<p class="confirm-text">O abrigo <strong style="color:var(--text)">#'+a.num+'</strong> será liberado e todos os dados do cliente — parcelas, histórico e anexos — serão transferidos para o abrigo selecionado.</p>'
    + '<div class="form-group"><label class="form-label">Transferir para qual abrigo? *</label>'
    + '<select class="form-select" id="tr-destino">'+opts+'</select></div>'
    + '<div class="form-group"><label class="form-label">Motivo da transferência *</label>'
    + '<input class="form-input" id="tr-motivo" placeholder="Ex: porta quebrada, problema estrutural..."></div>'
    + '<div class="form-group"><label class="form-label">Funcionário responsável</label>'
    + '<input class="form-input" id="tr-func" placeholder="Nome do funcionário"></div>'
    + '<div class="form-footer">'
    + '<button class="btn btn-cancel" onclick="fechar(\'overlayModal\')">Cancelar</button>'
    + '<button class="btn btn-green" onclick="confirmarTransferencia('+id+')">🔄 Confirmar Transferência</button>'
    + '</div></div>';
  abrir('overlayModal');
}

async function confirmarTransferencia(origemId) {
  const motivo = document.getElementById('tr-motivo').value.trim();
  const func = document.getElementById('tr-func').value.trim();
  if (!motivo) { alert('Informe o motivo da transferência.'); return; }
  const destinoId = parseInt(document.getElementById('tr-destino').value);
  const origem = abrigos.find(x => x.id === origemId);
  const destino = abrigos.find(x => x.id === destinoId);
  const desc = 'Transferido de #'+origem.num+' para #'+destino.num+'. Motivo: '+motivo+(func?' | Func: '+func:'');

  // Register on origin
  origem.historico.unshift({ tipo: 'devolucao', data: hoje(), desc: 'Transferência: locação movida para abrigo #'+destino.num+'. Motivo: '+motivo, obs: '' });
  if (!origem.transferencias) origem.transferencias = [];
  origem.transferencias.push({ data: hoje(), para: destino.num, motivo, func });

  // Copy everything to destino
  destino.status = 'alugado';
  destino.locatario = origem.locatario;
  destino.doc = origem.doc;
  destino.tel = origem.tel;
  destino.endereco = origem.endereco;
  destino.funcEntregou = func || origem.funcEntregou;
  destino.dataLocacao = origem.dataLocacao;
  destino.valorMensal = origem.valorMensal;
  destino.multaAtraso = origem.multaAtraso;
  destino.dataDevolucaoPrevista = origem.dataDevolucaoPrevista;
  destino.obs = origem.obs;
  destino.parcelas = origem.parcelas;
  destino.dividas = origem.dividas || [];
  destino.anexos = origem.anexos || [];
  destino.historico = [...(origem.historico || [])];
  destino.historico.unshift({ tipo: 'locacao', data: hoje(), desc: 'Transferido do abrigo #'+origem.num+'. Motivo: '+motivo+(func?' | Func: '+func:''), obs: '' });
  if (!destino.transferencias) destino.transferencias = [];
  destino.transferencias.push({ data: hoje(), de: origem.num, motivo, func });

  // Reset origem
  Object.assign(origem, {
    status: 'manutencao_pendente', locatario: '', doc: '', tel: '', endereco: '',
    funcEntregou: '', funcRecolheu: '', dataLocacao: '', valorMensal: '',
    multaAtraso: '', dataDevolucaoPrevista: '', obs: '', parcelas: [],
    dividas: [], anexos: [], emManutencao: true
  });
  origem.historico.unshift({ tipo: 'manutencao', data: hoje(), desc: 'Abrigo entrou em manutenção após transferência. Motivo: '+motivo, obs: '' });

  addLog('transferencia', 'Locação transferida do abrigo #'+origem.num+' para #'+destino.num+'. Cliente: '+destino.locatario+'. Motivo: '+motivo, origem.num);
  fechar('overlayModal'); fechar('overlayDetalhe'); renderGrid();
  await salvar();
  setTimeout(() => { renderDetalhe(destino, calcStatus(destino), 'dados'); abrir('overlayDetalhe'); }, 200);
}

// ─── LOG / HISTÓRICO GERAL ────────────────────────────────
function abrirLogGlobal() {
  const panel = document.getElementById('panelLog');
  const CORES = {
    locacao: 'var(--blue)', entrega: 'var(--green)', devolucao: 'var(--yellow)',
    cancelamento: 'var(--red)', transferencia: 'var(--purple)', manutencao: '#bd93f9',
    pagamento: 'var(--green)', edicao: 'var(--muted)'
  };
  const ICONS = {
    locacao:'📝', entrega:'🚚', devolucao:'↩', cancelamento:'✕',
    transferencia:'🔄', manutencao:'🔧', pagamento:'💰', edicao:'✏️'
  };

  const rows = logGlobal.length > 0
    ? logGlobal.map(l => {
        const d = new Date(l.ts);
        const dataStr = d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        const cor = CORES[l.tipo] || 'var(--muted)';
        const icon = ICONS[l.tipo] || '•';
        return '<div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start">'
          + '<span style="font-size:16px;margin-top:1px">'+icon+'</span>'
          + '<div style="flex:1;min-width:0">'
          + '<div style="font-size:12px;color:var(--text)">'+esc(l.desc)+'</div>'
          + '<div style="display:flex;gap:10px;margin-top:3px">'
          + '<span style="font-size:10px;color:'+cor+';font-family:var(--font-mono);text-transform:uppercase">'+l.tipo+'</span>'
          + (l.abrigoNum ? '<span style="font-size:10px;color:var(--muted)">Abrigo #'+l.abrigoNum+'</span>' : '')
          + (l.usuario ? '<span style="font-size:10px;color:var(--muted)">'+esc(l.usuario)+'</span>' : '')
          + '</div></div>'
          + '<span style="font-size:10px;color:var(--muted);white-space:nowrap;margin-top:2px">'+dataStr+'</span>'
          + '</div>';
      }).join('')
    : '<div style="color:var(--muted);font-size:13px;padding:20px 0">Nenhuma ação registrada ainda.</div>';

  panel.innerHTML = ''
    + '<div class="panel-header" style="position:sticky;top:0;background:var(--surface);z-index:1">'
    +   '<div><div class="panel-title">📋 Histórico Geral do Sistema</div>'
    +   '<div class="panel-sub">'+logGlobal.length+' evento(s) registrado(s)</div></div>'
    +   '<button class="close-btn" onclick="fechar(\'overlayLog\')">×</button>'
    + '</div>'
    + '<div class="panel-body">'+rows+'</div>';
  abrir('overlayLog');
}

// ─── EXPORT ───────────────────────────────────────────────
function exportarCSV() {
  const cols = ['Nº', 'Status', 'Locatário', 'CPF/CNPJ', 'Telefone', 'Endereço', 'Func.Entregou', 'Data Locação', 'Valor Mensal', 'Multa Atraso', 'Dev.Prevista', 'Parcelas Pagas', 'Parcelas Atrasadas', 'Observações'];
  const rows = abrigos.map(a => {
    const pagas = (a.parcelas || []).filter(p => p.status === 'pago').length;
    const atrasadas = (a.parcelas || []).filter(p => p.status === 'atrasado').length;
    return [a.num, STATUS_LABEL[calcStatus(a)], a.locatario, a.doc, a.tel, a.endereco, a.funcEntregou, a.dataLocacao ? fmtDate(a.dataLocacao) : '', a.valorMensal ? 'R$ ' + a.valorMensal : '', a.multaAtraso ? 'R$ ' + a.multaAtraso : '', a.dataDevolucaoPrevista ? fmtDate(a.dataDevolucaoPrevista) : '', pagas, atrasadas, a.obs];
  });
  const csv = [cols, ...rows].map(r => r.map(c => `"${(c || '').toString().replace(/"/g, '""')}"`).join(';')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const el = document.createElement('a');
  el.href = url; el.download = `abrigos_${hoje().replace(/\//g, '-')}.csv`; el.click();
}

// ─── UTILS ────────────────────────────────────────────────
function v(id) { return (document.getElementById(id)?.value || '').trim(); }
function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function hoje() { return new Date().toLocaleDateString('pt-BR'); }
function fmtDate(s) { if (!s) return ''; const [y, m, d] = s.split('-'); return `${d}/${m}/${y}`; }
function mostrar(id) {
  ['loginScreen', 'loadingScreen', 'app'].forEach(i => {
    const el = document.getElementById(i);
    el.style.display = i === id ? (i === 'loadingScreen' ? 'flex' : 'block') : 'none';
  });
  if (id === 'loginScreen') document.getElementById('loginScreen').style.display = 'flex';
}
function abrir(id) { document.getElementById(id).classList.add('open'); }
function fechar(id) { document.getElementById(id).classList.remove('open'); }
function fecharSeOverlay(e, id) { if (e.target.id === id) fechar(id); }

init();
</script>
